<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V3 Master: เกมกริยา 3 ช่องสำหรับ สกร.โนนสัง</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2563eb; --primary-dark: #1e40af; --primary-light: #eff6ff;
    --success: #166534; --success-light: #f0fdf4;
    --danger: #991b1b; --danger-light: #fef2f2;
    --warning: #d97706; --warning-light: #fffbe6;
    --gray-bg: #f8fafc; --text: #1e293b;
  }
  body { font-family: 'Sarabun', sans-serif; background: var(--gray-bg); color: var(--text); padding: 20px 10px; line-height: 1.6; }
  .container { max-width: 600px; margin: 0 auto; }
  
  .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  
  .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }

  /* Progress Bar */
  .progress-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 14px; font-weight: 600; }
  .progress-bar-bg { flex-grow: 1; background: #e2e8f0; height: 10px; border-radius: 5px; overflow: hidden; }
  .progress-bar-fill { background: var(--primary); height: 100%; width: 0%; transition: width 0.3s; }

  /* Hint & Question */
  .hint-box { background: var(--warning-light); border-left: 5px solid var(--warning); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 15px; color: #92400e; }
  .question-text { font-size: 20px; font-weight: 700; margin-bottom: 15px; color: var(--primary-dark); }
  .instruction { font-size: 14px; color: #64748b; margin-bottom: 20px; }

  /* Options */
  .options-list { display: flex; flex-direction: column; gap: 12px; }
  .option-item { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 16px; font-weight: 500; display: flex; align-items: center; }
  .option-item:hover { border-color: var(--primary); background: var(--primary-light); }
  .option-item.selected { border-color: var(--primary); background: var(--primary-light); }
  .option-item.correct { border-color: var(--success); background: var(--success-light); color: var(--success); }
  .option-item.wrong { border-color: var(--danger); background: var(--danger-light); color: var(--danger); }
  .option-item.disabled { pointer-events: none; }

  /* Rationale */
  .rationale-box { margin-top: 20px; padding: 15px; border-radius: 12px; font-size: 14px; animation: fadeIn 0.3s ease; }
  .rationale-box.correct { background: var(--success-light); border: 1px dashed var(--success); color: var(--success); }
  .rationale-box.wrong { background: var(--danger-light); border: 1px dashed var(--danger); color: var(--danger); }

  .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 15px; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container">
  <div id="quiz-container">
    <!-- Content will be injected here -->
  </div>
</div>

<script>
const quizData = [
  {
    verb: "GO (ไป)",
    hint: "คำนี้เปลี่ยนรูปไปเลย ไม่มีการเติม -ed นะครับ ให้ท่องว่า 'โก-เว้นท์-กอน'",
    options: [
      { text: "went, gone", rationale: "ถูกต้อง! go (ช่อง 1) -> went (ช่อง 2) -> gone (ช่อง 3)", isCorrect: true },
      { text: "goed, goed", rationale: "ผิดครับ! go เป็นกริยาไม่ปกติ ห้ามเติม -ed เด็ดขาด", isCorrect: false },
      { text: "goes, gone", rationale: "เกือบถูก! แต่ goes คือรูปที่ใช้กับประธานเอกพจน์ในปัจจุบัน ไม่ใช่ช่อง 2", isCorrect: false }
    ]
  },
  {
    verb: "EAT (กิน)",
    hint: "ช่อง 2 แค่สลับตัวอักษรจากคำเดิม ส่วนช่อง 3 เติม -en ต่อท้าย",
    options: [
      { text: "ate, eaten", rationale: "ถูกต้อง! eat -> ate (สลับตัวอักษร) -> eaten", isCorrect: true },
      { text: "eated, eaten", rationale: "ผิดครับ! ช่อง 2 ของ eat ต้องเปลี่ยนรูปเป็น ate", isCorrect: false },
      { text: "ate, ate", rationale: "ยังไม่ครบ! ช่อง 2 และ 3 ของคำนี้เขียนไม่เหมือนกัน", isCorrect: false }
    ]
  },
  {
    verb: "'Drink' (ดื่ม) คืออะไร?",
    hint: "เสียงสระของคำนี้จะเปลี่ยนไปตามเสียง 'อิ - แอะ - อะ",
    options: [
      { text: "drank / drunk", rationale: "ถูกต้อง! Drink - Drank - Drunk (ดริ้งค์ - แดร้งค์ - ดรั้งค์) จำง่ายๆ สระจะเปลี่ยนตามลำดับ i -> a -> u ครับ", isCorrect: true },
      { text: "drinked / drinked", rationale: "ยังไม่ถูกจ้า คำนี้เปลี่ยนสระด้านในเพื่อบอกอดีต ไม่เติม -ed นะครับ", isCorrect: false },
      { text: "drunk / drank", rationale: "สลับตำแหน่งกันนิดเดียวครับ ช่อง 2 ต้องสระ a (drank) และช่อง 3 ต้องสระ u (drunk) ครับ", isCorrect: false }
    ]
  },
   {
    verb: "'See' (เห็น) คืออะไร?",
    hint: "ช่อง 2 เขียนและออกเสียงเหมือนคำว่า 'เลื่อย' หรือเครื่องเล่นม้ากระดก (ซีซอว์)",
    options: [
      { text: "saw / seen", rationale: "ยอดเยี่ยม! See - Saw - Seen (ซี - ซอว์ - ซีน) ท่องให้ขึ้นใจได้เลยครับ", isCorrect: true },
      { text: "seed / seed", rationale: "ยังไม่ใช่ครับ seed แปลว่าเมล็ดพืชครับ ส่วนกริยา see ต้องเปลี่ยนรูปเป็น saw นะครับ", isCorrect: false },
      { text: "seen / saw", rationale: "สลับตำแหน่งกันครับ ช่อง 2 ต้องเป็น saw และช่อง 3 ต้องเป็น seen ครับ", isCorrect: false }
    ]
  },
    {
    verb: "คำกริยาช่อง 2 และ 3 ของ 'Come' (มา) คืออะไร?",
    hint: "ช่อง 2 เขียนและออกเสียงเหมือนคำว่า 'เลื่อย' หรือเครื่องเล่นม้ากระดก (ซีซอว์)",
    options: [
      { text: "came / come", rationale: "ถูกต้องที่สุด! Come - Came - Come (คัม - เคม - คัม) ช่อง 1 กับช่อง 3 หน้าตาเหมือนกันเลย จำง่ายมากครับ", isCorrect: true },
      { text: "comed / comed", rationale: "ยังไม่ถูกครับ คำนี้ห้ามเติม -ed นะ ต้องเปลี่ยนรูปตรงกลางจาก o เป็น a ในช่อง 2 ครับ", isCorrect: false },
      { text: "came / came", rationale: "เกือบถูกครับ แต่จำไว้ว่าช่อง 3 จะกลับมาหน้าตาเหมือนช่อง 1 คือคำว่า come ครับ", isCorrect: false }
    ]
  },
   {
    verb: "คำกริยาช่อง 2 และ 3 ของ 'Do' (ทำ) คืออะไร?",
    hint: "ช่องที่ 3 ออกเสียงคล้ายๆ กับคำว่า 'ดัน' (Done) ในภาษาไทยครับ",
    options: [
      { text: "did / done", rationale: "เก่งมากครับ! Do - Did - Done (ดู - ดิด - ดัน) เป็นคำพื้นฐานที่เจอในข้อสอบและชีวิตประจำวันบ่อยที่สุดเลย", isCorrect: true },
      { text: "doed / doed", rationale: "ไม่ถูกครับ คำว่า do ไม่มีรูปเติม -ed นะครับ ต้องเปลี่ยนรูปไปเลย", isCorrect: false },
      { text: "does / doing", rationale: "อันนี้เป็นรูปใช้กับประธานเอกพจน์ (does) และรูปกำลังทำ (doing) ครับ ไม่ใช่กริยา 3 ช่องนะ" , isCorrect: false }
    ]
  },
   {
    verb:  "คำกริยาช่อง 2 และ 3 ของ 'Make' (ทำ/สร้าง) คืออะไร?",
    hint: "ลองนึกถึงป้ายสลักหลังสิ่งของหรือของเล่น เช่น '_____ in Thailand'",
    options: [
      { text: "made / made", rationale: "ถูกต้องเลย! Make - Made - Made (เมค - เมด - เมด) ช่อง 2 และ 3 หน้าตาเหมือนกันเลยครับ", isCorrect: true },
      { text: "maked / maked", rationale: "ยังไม่ถูกครับ คำนี้เราจะไม่เติม -ed แต่จะเปลี่ยนตัว k เป็นตัว d แทนครับ", isCorrect: false },
      { text: "make / made", rationale: "ยังไม่ครบถ้วนครับ ช่อง 2 และช่อง 3 ต้องเปลี่ยนรูปเป็น made ทั้งคู่เลยครับ" , isCorrect: false }
    ]
  },
   {
    verb:  "คำกริยาช่อง 2 และ 3 ของ 'Buy' (ซื้อ) คืออะไร?",
    hint: "ทั้งช่อง 2 และ 3 จะเปลี่ยนรูปยาวขึ้น สะกดด้วย -ought ออกเสียงคล้ายๆ คำว่า 'บอท'",
    options: [
      { text: "bought / bought", rationale: "เก่งมากครับ! Buy - Bought - Bought (บาย - บอท - บอท) เปลี่ยนรูปไปเยอะหน่อย แต่ช่อง 2 กับ 3 เหมือนกันนะ", isCorrect: true },
      { text: "buyed / buyed", rationale: "ผิดครับ! คำนี้ห้ามเติม -ed นะครับ ต้องเปลี่ยนรูปยาวขึ้นเป็น bought", isCorrect: false },
      { text: "brought / brought", rationale: "คำนี้หน้าตาคล้ายกันมาก แต่ brought (มีร.เรือ) มาจาก bring ที่แปลว่า 'นำมา' ครับ ส่วน buy (ซื้อ) ต้องไม่มี ร.เรือ (bought)" , isCorrect: false }
    ]
  },
  {
    verb:  "คำกริยาช่อง 2 และ 3 ของ 'Take' (เอาไป/พาไป/กินยา) คืออะไร?",
    hint: "ช่อง 2 ออกเสียงคล้ายคำว่า 'ทุก' ส่วนช่อง 3 จะลงท้ายด้วยเสียง '-เคน'",
    options: [
      { text: "took / taken", rationale: "เลิศ! Take - Took - Taken (เทค - ทุค - เทคเคน) ท่องรวมกันแล้วจำง่ายดีครับ", isCorrect: true },
      { text: "taked / taked", rationale: "ไม่ใช่ครับ ตัวนี้เป็นกริยาไม่ปกติ (Irregular) จะไม่มีการเติม -ed ต่อท้ายครับ", isCorrect: false },
      { text: "take / took", rationale: "ยังไม่ถูกครับ ช่อง 2 คือ took ถูกแล้ว แต่ช่อง 3 ต้องเปลี่ยนเป็น taken ครับ" , isCorrect: false }
    ]
  },
  {
    verb: "SEE (เห็น)",
    hint: "จำง่ายๆ ว่า 'ซี-ซอ-ซีน' ช่อง 2 จะคล้ายคำว่า 'เลื่อย' ในภาษาอังกฤษ",
    options: [
      { text: "saw, seen", rationale: "เป๊ะมาก! see -> saw -> seen", isCorrect: true },
      { text: "seed, seen", rationale: "อย่าเผลอเติม -ed นะครับ คำนี้ต้องเปลี่ยนรูป", isCorrect: false },
      { text: "saw, saw", rationale: "ช่อง 3 ต้องมีตัว n ต่อท้าย กลายเป็น seen ครับ", isCorrect: false }
    ]
  }
];

// เพิ่มเติมข้อมูลให้ครบ 20 คำตามโจทย์ (คำอื่นๆ เช่น Do, Come, Take, Give, Get, Make, Know, Buy, Think, Catch, Teach, Write, Read, Speak, Run, Swim, Sleep, Drink)

let currentQ = 0;
let score = 0;
let selected = null;
let isChecked = false;

function renderQuiz() {
  const container = document.getElementById('quiz-container');
  const q = quizData[currentQ];
  const pct = (currentQ / quizData.length) * 100;

  container.innerHTML = `
    <div class="header">
      <h1>V3 Master: ภารกิจกริยา 3 ช่อง</h1>
      <p>สำหรับนักศึกษา สกร.โนนสัง เลเวลพื้นฐาน</p>
    </div>

    <div class="card">
      <div class="progress-container">
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <span>${currentQ + 1}/${quizData.length}</span>
      </div>

      <div class="hint-box">💡 <b>คำใบ้ช่วยจำ:</b> ${q.hint}</div>
      
      <div class="instruction">จงเลือกกริยาช่อง 2 และ 3 ของคำว่า:</div>
      <div class="question-text">${q.verb}</div>

      <div class="options-list">
        ${q.options.map((opt, i) => `
          <div class="option-item ${isChecked ? (opt.isCorrect ? 'correct' : (selected === i ? 'wrong' : '')) : (selected === i ? 'selected' : '')} ${isChecked ? 'disabled' : ''}" 
               onclick="selectOpt(${i})">
            ${opt.text}
          </div>
        `).join('')}
      </div>

      ${isChecked ? `
        <div class="rationale-box ${q.options[selected].isCorrect ? 'correct' : 'wrong'}">
          <b>${q.options[selected].isCorrect ? '✨ เก่งมาก!' : '❌ ทบทวนกันนิด:'}</b> ${q.options[selected].rationale}
        </div>
        <button class="btn btn-primary" onclick="nextQ()">${currentQ === quizData.length - 1 ? 'ดูสรุปคะแนน' : 'ข้อถัดไป'}</button>
      ` : `
        <button class="btn btn-primary" ${selected === null ? 'disabled' : ''} onclick="checkAns()">ยืนยันคำตอบ</button>
      `}
    </div>
  `;
}

window.selectOpt = (i) => { selected = i; renderQuiz(); };
window.checkAns = () => { isChecked = true; if(quizData[currentQ].options[selected].isCorrect) score++; renderQuiz(); };
window.nextQ = () => {
  if (currentQ < quizData.length - 1) {
    currentQ++; selected = null; isChecked = false; renderQuiz();
  } else {
    showSummary();
  }
};

function showSummary() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = `
    <div class="card" style="text-align:center">
      <h2 style="font-size:30px">🏆 จบภารกิจ!</h2>
      <p>คุณทำคะแนนได้</p>
      <div style="font-size:60px; font-weight:800; color:var(--primary)">${score}/${quizData.length}</div>
      <p>${score >= 15 ? 'สุดยอดไปเลย! คุณคือปรมาจารย์กริยา 3 ช่อง' : 'พยายามได้ดีมาก! ลองกลับมาเล่นซ้ำเพื่อความแม่นยำนะครับ'}</p>
      <button class="btn btn-primary" onclick="location.reload()">เล่นใหม่อีกครั้ง</button>
    </div>
  `;
}

renderQuiz();
</script>
</body>
</html>
