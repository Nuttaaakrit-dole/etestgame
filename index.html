<style>

  .progress-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 14px; font-weight: 600; }
  .progress-bar-bg { flex-grow: 1; background: #e2e8f0; height: 10px; border-radius: 5px; overflow: hidden; }
  .progress-bar-fill { background: var(--primary); height: 100%; width: 0%; transition: width 0.3s; }

  /* Hint & Question */
  .hint-box { background: var(--warning-light); border-left: 5px solid var(--warning); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 15px; color: #92400e; }
  .question-text { font-size: 20px; font-weight: 700; margin-bottom: 15px; color: var(--primary-dark); }
  .instruction { font-size: 14px; color: #64748b; margin-bottom: 20px; }

  .options-list { display: flex; flex-direction: column; gap: 12px; }
  .option-item { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 16px; font-weight: 500; display: flex; align-items: center; }
  .option-item:hover { border-color: var(--primary); background: var(--primary-light); }
  .option-item.selected { border-color: var(--primary); background: var(--primary-light); }
  .option-item.correct { border-color: var(--success); background: var(--success-light); color: var(--success); }
  .option-item.wrong { border-color: var(--danger); background: var(--danger-light); color: var(--danger); }
  .option-item.disabled { pointer-events: none; }

  .rationale-box { margin-top: 20px; padding: 15px; border-radius: 12px; font-size: 14px; animation: fadeIn 0.3s ease; }
  .rationale-box.correct { background: var(--success-light); border: 1px dashed var(--success); color: var(--success); }
  .rationale-box.wrong { background: var(--danger-light); border: 1px dashed var(--danger); color: var(--danger); }

  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; }

      { text: "knew / knew", rationale: "เกือบถูกครับ แต่ช่อง 3 ต้องเพิ่มตัว n ต่อท้ายกลายเป็น known ครับจะไม่เหมือนช่อง 2", isCorrect: false }
    ]
  },
  {
    verb: "CUT (ตัด)",
    hint: "คำนี้ใจดีกับคนเรียนที่สุดในโลก เพราะหน้าตาและเสียงเหมือนกันหมดทั้ง 3 ช่องเลย!",
    options: [
      { text: "cut / cut", rationale: "ถูกต้องที่สุด! Cut - Cut - Cut เหมือนกันหมดทุกช่อง จำง่ายสบายใจที่สุดเลยครับคำนี้", isCorrect: true },
      { text: "cuted / cuted", rationale: "ผิดครับ ไม่ต้องเติม -ed ใดๆ ทั้งสิ้น เขียนเหมือนช่อง 1 ได้ทันทีเลยครับ", isCorrect: false },
      { text: "cat / cut", rationale: "ยังไม่ใช่ครับ cat แปลว่าแมวครับ ส่วนกริยา cut รูปอดีตก็ยังคงเป็น cut เหมือนเดิมนะ", isCorrect: false }
    ]
  },
  {
    verb: "DRIVE (ขับรถ)",
    hint: "ช่อง 2 เปลี่ยนเป็นสระโอ (Drove) ส่วนช่อง 3 เปลี่ยนเป็นเสียงสระอิสั้นๆ แล้วเติม -en (Driven)",
    options: [
      { text: "drove / driven", rationale: "สุดยอดมากครับ! ทำครบ 20 ข้อแล้ว Drive - Drove - Driven เก่งมากๆ ครับ!", isCorrect: true },
      { text: "drived / drived", rationale: "ยังไม่ถูกจ้า คำนี้ลงท้ายด้วย e แต่เราไม่เติม d ต่อท้าย ต้องเปลี่ยนรูปครับ", isCorrect: false },
      { text: "drove / drove", rationale: "ยังไม่ถูกครับ ช่อง 3 ต้องเปลี่ยนรูปสระสั้นลงและเติม -en กลายเป็น driven นะครับ", isCorrect: false }
    ]
  }
];

// ฟังก์ชันสลับตำแหน่งใน Array (Fisher-Yates Shuffle)
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

let shuffledQuizData = [];
let currentQ = 0;
let score = 0;
let selected = null;
let isChecked = false;

// ฟังก์ชันเริ่มต้นชุดข้อสอบ (ทำสำเนาข้อมูล -> สลับข้อ -> สลับตัวเลือกภายในข้อ)
function initQuiz() {
  shuffledQuizData = shuffleArray([...quizData].map(q => ({
    ...q,
    options: shuffleArray([...q.options])
  })));
  currentQ = 0;
  score = 0;
  selected = null;
  isChecked = false;
}

function renderQuiz() {
  const container = document.getElementById('quiz-container');
  const q = shuffledQuizData[currentQ];
  const pct = (currentQ / shuffledQuizData.length) * 100;

  container.innerHTML = `
    <div class="header">
      <h1>V3 Master: ภารกิจกริยา 3 ช่อง</h1>
      <p>สำหรับนักศึกษา สกร.โนนสัง เลเวลพื้นฐาน</p>
    </div>

    <div class="card">
      <div class="progress-container">
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <span>${currentQ + 1}/${shuffledQuizData.length}</span>
      </div>

      <div class="hint-box">💡 <b>คำใบ้ช่วยจำ:</b> ${q.hint}</div>
      
      <div class="instruction">จงเลือกกริยาช่อง 2 และ 3 ของคำว่า:</div>
      <div class="question-text">${q.verb}</div>

      <div class="options-list">
        ${q.options.map((opt, i) => `
          <div class="option-item ${isChecked ? (opt.isCorrect ? 'correct' : (selected === i ? 'wrong' : '')) : (selected === i ? 'selected' : '')} ${isChecked ? 'disabled' : ''}" 
               onclick="selectOpt(${i})">
            ${opt.text}
          </div>
        `).join('')}
      </div>

      ${isChecked ? `
        <div class="rationale-box ${q.options[selected].isCorrect ? 'correct' : 'wrong'}">
          <b>${q.options[selected].isCorrect ? '✨ เก่งมาก!' : '❌ ทบทวนกันนิด:'}</b> ${q.options[selected].rationale}
        </div>
        <button class="btn btn-primary" onclick="nextQ()">${currentQ === shuffledQuizData.length - 1 ? 'ดูสรุปคะแนน' : 'ข้อถัดไป'}</button>
      ` : `
        <button class="btn btn-primary" ${selected === null ? 'disabled' : ''} onclick="checkAns()">ยืนยันคำตอบ</button>
      `}
    </div>
  `;
}

window.selectOpt = (i) => { if (!isChecked) { selected = i; renderQuiz(); } };
window.checkAns = () => { isChecked = true; if(shuffledQuizData[currentQ].options[selected].isCorrect) score++; renderQuiz(); };
window.nextQ = () => {
  if (currentQ < shuffledQuizData.length - 1) {
    currentQ++; selected = null; isChecked = false; renderQuiz();
  } else {
    showSummary();
  }
};

function showSummary() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = `
    <div class="card" style="text-align:center">
      <h2 style="font-size:30px">🏆 จบภารกิจ!</h2>
      <p>คุณทำคะแนนได้</p>
      <div style="font-size:60px; font-weight:800; color:var(--primary)">${score}/${shuffledQuizData.length}</div>
      <p>${score >= 15 ? 'สุดยอดไปเลย! คุณคือปรมาจารย์กริยา 3 ช่อง' : 'พยายามได้ดีมาก! ลองกลับมาเล่นซ้ำเพื่อความแม่นยำนะครับ'}</p>
      <button class="btn btn-primary" onclick="initQuiz(); renderQuiz();">เล่นใหม่อีกครั้ง (สุ่มระบบใหม่)</button>
    </div>
  `;
}

// เริ่มต้นเรียกใช้งานระบบครั้งแรก
initQuiz();
renderQuiz();
</script>
